<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sambung Kata Generator</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    width:550px;
    background:white;
    border-radius:25px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

h1{
    margin-top:0;
}

#huruf{
    font-size:90px;
    font-weight:bold;
    color:#2196F3;
    margin:20px 0;
}

input{
    width:90%;
    padding:15px;
    font-size:18px;
    border-radius:10px;
    border:2px solid #ddd;
}

button{
    margin-top:15px;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#2196F3;
    color:white;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

#hasil{
    min-height:35px;
}

.info{
    display:flex;
    justify-content:space-around;
    margin-top:15px;
    font-weight:bold;
}

#riwayat{
    margin-top:20px;
    text-align:left;
    max-height:200px;
    overflow-y:auto;
    border-top:1px solid #ddd;
    padding-top:10px;
}

.item{
    padding:5px;
    border-bottom:1px solid #eee;
}

</style>
</head>
<body>

<div class="card">

<h1>🎮 Sambung Kata Generator</h1>

<div id="huruf">A</div>

<input
id="kata"
placeholder="Masukkan kata..."
autocomplete="off"
>

<br>

<button onclick="cekKata()">
Jawab
</button>

<h2 id="hasil"></h2>

<div class="info">

<div>
🏆 Skor
<br>
<span id="skor">0</span>
</div>

<div>
📚 Database
<br>
<span id="jumlahKata">0</span>
</div>

</div>

<div id="riwayat"></div>

</div>

<script>

// =======================
// GENERATOR KATA
// =======================

function generateWord(){

    const sukuKata = [

        "ka","ki","ku","ke","ko",
        "sa","si","su","se","so",
        "ra","ri","ru","re","ro",
        "na","ni","nu","ne","no",
        "ta","ti","tu","te","to",
        "ma","mi","mu","me","mo",
        "la","li","lu","le","lo",
        "va","ve","vi","vo","vu",
        "za","ze","zi","zo","zu"

    ];

    let hasil = "";

    let panjang =
    Math.floor(Math.random() * 4) + 2;

    for(let i=0;i<panjang;i++){

        hasil += sukuKata[
            Math.floor(
                Math.random() *
                sukuKata.length
            )
        ];

    }

    return hasil;

}

// =======================
// DATABASE OTOMATIS
// =======================

const database = [];

while(database.length < 5000){

    let kataBaru =
    generateWord();

    if(
        !database.includes(
            kataBaru
        )
    ){
        database.push(
            kataBaru
        );
    }

}

// =======================
// INFO DATABASE
// =======================

document.getElementById(
"jumlahKata"
).innerText =
database.length;

// =======================
// HURUF TERSEDIA
// =======================

const hurufTersedia =
[
...new Set(
database.map(
kata =>
kata[0]
.toUpperCase()
)
)
];

// =======================
// HURUF ACAK
// =======================

function hurufAcak(){

    return hurufTersedia[
        Math.floor(
            Math.random() *
            hurufTersedia.length
        )
    ];

}

// =======================
// GAME
// =======================

let skor = 0;

let hurufSekarang =
hurufAcak();

document
.getElementById("huruf")
.innerText =
hurufSekarang;

// =======================
// CEK KATA
// =======================

function cekKata(){

    let kata =
    document
    .getElementById("kata")
    .value
    .toLowerCase()
    .trim();

    if(kata === ""){
        return;
    }

    if(
        !kata.startsWith(
            hurufSekarang
            .toLowerCase()
        )
    ){

        document
        .getElementById("hasil")
        .innerText =
        "❌ Huruf awal salah";

        return;

    }

    if(
        !database.includes(
            kata
        )
    ){

        document
        .getElementById("hasil")
        .innerText =
        "❌ Kata tidak ditemukan";

        return;

    }

    skor +=
    kata.length;

    document
    .getElementById("skor")
    .innerText =
    skor;

    document
    .getElementById("hasil")
    .innerText =
    "✅ Benar (+"
    + kata.length +
    " poin)";

    document
    .getElementById("riwayat")
    .innerHTML =
    `
    <div class="item">
    ✔ ${kata}
    </div>
    `
    +
    document
    .getElementById("riwayat")
    .innerHTML;

    hurufSekarang =
    hurufAcak();

    document
    .getElementById("huruf")
    .innerText =
    hurufSekarang;

    document
    .getElementById("kata")
    .value =
    "";

}

// =======================
// ENTER
// =======================

document
.getElementById("kata")
.addEventListener(
"keydown",
function(e){

    if(
        e.key === "Enter"
    ){
        cekKata();
    }

}
);

console.log(
"Database:",
database.length,
"kata"
);

</script>

</body>
</html>
